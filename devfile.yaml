schemaVersion: 2.3.0
metadata:
  name: ocp-devdays-workspace
dependentProjects:
- name: ocp-dev-days-rdshw-automation
  git:
    remotes:
      origin: https://github.com/cgruver/ocp-dev-days-rdshw-automation.git
    checkoutFrom:
      remote: origin
      revision: main
- name: ocp-dev-days-rdshw-gitops
  git:
    remotes:
      origin: https://github.com/cgruver/ocp-dev-days-rdshw-gitops.git
    checkoutFrom:
      remote: origin
      revision: main
- name: ocp-dev-days-rdshw-showroom
  git:
    remotes:
      origin: https://github.com/cgruver/ocp-dev-days-rdshw-showroom.git
    checkoutFrom:
      remote: origin
      revision: main
- name: workspace-images
  git:
    remotes:
      origin: https://github.com/cgruver/dev-days-workspace-images.git
    checkoutFrom:
      remote: origin
      revision: main
- name: parasol-insurance
  git:
    remotes:
      origin: https://github.com/cgruver/ocp-devdays-parasol-insurance.git
    checkoutFrom:
      remote: origin
      revision: main
components:
- name: dev-tools
  container:
    image: image-registry.openshift-image-registry.svc:5000/cekit-images/ops-tools:latest
    memoryLimit: 6Gi
    memoryRequest: 1Gi
    cpuLimit: "4"
    cpuRequest: 100m
    mountSources: true
    env:
    - name: SHELL
      value: "/bin/zsh"
    - name: VSCODE_DEFAULT_WORKSPACE
      value: "$(PROJECT_SOURCE)/vscode.code-workspace"
- volume:
    size: 50Gi
  name: projects
- name: prep-workspace
  container:
    args:
      - '-c'
      - >-
        mkdir -p /projects/.bin && cp /usr/bin/oc /projects/.bin/oc && cp /usr/bin/kubectl /projects/.bin/kubectl && if [[ -f ${HOME}/.kube/config ]]; then rm ${HOME}/.kube/config; fi
    command:
      - /bin/bash
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    mountSources: true
    sourceMapping: /projects
    memoryRequest: 128Mi
    memoryLimit: 256Mi
    cpuRequest: 10m
    cpuLimit: 200m
    env:
    - name: HOME
      value: "/projects"
commands:
- apply:
    component: prep-workspace
    label: Pre Start Prep
  id: prep-workspace
events:
  preStart:
    - prep-workspace
